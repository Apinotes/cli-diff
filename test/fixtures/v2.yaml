openapi: "3.0.3"
info:
  title: Example API
  version: "2.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: filter
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, name]
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  role:
                    type: string
                    enum: [admin, user]
  /orders:
    post:
      operationId: createOrder
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_id, currency]
              properties:
                item_id:
                  type: string
                currency:
                  type: string
                  default: EUR
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [order_id]
                properties:
                  order_id:
                    type: string
  /products/{id}:
    get:
      operationId: getProduct
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
