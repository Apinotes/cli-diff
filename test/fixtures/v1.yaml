openapi: "3.0.3"
info:
  title: Example API
  version: "1.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, email, name]
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                  role:
                    type: string
                    enum: [admin, user, guest]
  /orders:
    post:
      operationId: createOrder
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_id]
              properties:
                item_id:
                  type: string
                currency:
                  type: string
                  default: USD
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [order_id]
                properties:
                  order_id:
                    type: string
